# /etc/nginx/sites-available/api.skiltak.com
# Backend Django detrás de Gunicorn (unix socket).

upstream skiltak_gunicorn {
    server unix:/run/skiltak-gunicorn.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.skiltak.com;

    # Permitir el challenge HTTP-01 de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.skiltak.com;

    ssl_certificate     /etc/letsencrypt/live/api.skiltak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.skiltak.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;

    # Estáticos de Django (admin, DRF browsable API).
    location /static/ {
        alias /var/www/skiltak/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/skiltak/backend/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://skiltak_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
