# /etc/nginx/sites-available/api.skiltak.com
# Backend Django detrás de Gunicorn (unix socket).

upstream skiltak_gunicorn {
    server unix:/run/skiltak-gunicorn.sock;
}

# Rate limit zones — capa extra al rate limit aplicativo de Django.
# Auth endpoints más agresivos; resto de la API más permisivo.
limit_req_zone $binary_remote_addr zone=skiltak_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=skiltak_auth:10m rate=2r/s;

server {
    listen 80;
    listen [::]:80;
    server_name api.skiltak.com;

    # Permitir el challenge HTTP-01 de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.skiltak.com;

    # Certbot emitió UN cert combinado para skiltak.com + www + api,
    # no uno por subdominio. Los tres vhosts apuntan al mismo path.
    ssl_certificate     /etc/letsencrypt/live/skiltak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skiltak.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;

    # ===== Security headers — mismo set que el frontend =====
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    # CSP para la API — bloquea recursos externos pero permite los self-
    # hosted del backend (Django admin, DRF browsable API, páginas de
    # error 4xx/5xx que Django renderiza con <style> inline, y el HTML
    # transitorio del callback de LinkedIn OAuth cuando algo falla antes
    # del redirect al frontend). `default-src 'none'` a secas rompía
    # todo eso — los assets legítimos del propio api.skiltak.com quedaban
    # bloqueados igual que un JS externo malicioso.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'" always;

    # Estáticos de Django (admin, DRF browsable API).
    location /static/ {
        alias /var/www/skiltak/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/skiltak/backend/media/;
        access_log off;
        expires 7d;
        # Media uploads servidos como attachment, no inline — anti XSS por
        # SVG/HTML disfrazado de imagen subida por usuarios.
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Disposition "attachment" always;
    }

    # Rate limit más agresivo en endpoints de auth (anti brute force +
    # credential stuffing).
    location ~ ^/api/(token|users/(register|password-reset))/ {
        limit_req zone=skiltak_auth burst=5 nodelay;
        proxy_pass http://skiltak_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }

    location / {
        limit_req zone=skiltak_api burst=40 nodelay;
        proxy_pass http://skiltak_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        # 180s alineado con --timeout de gunicorn. El único endpoint que
        # se acerca a este límite es /api/jobs/jobs/scrape/ (scrapers
        # síncronos con Playwright). Bajo esto y volvemos a los 502
        # sin CORS que reporta el browser como URL malformada.
        proxy_read_timeout 180s;
    }
}
