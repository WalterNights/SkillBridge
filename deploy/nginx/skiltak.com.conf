# /etc/nginx/sites-available/skiltak.com
# Frontend Angular (estáticos servidos por Nginx).

server {
    listen 80;
    listen [::]:80;
    server_name skiltak.com www.skiltak.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name skiltak.com www.skiltak.com;

    ssl_certificate     /etc/letsencrypt/live/skiltak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skiltak.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/skiltak/frontend/dist/skill-bridge-front/browser;
    index index.html;

    # Hashed assets de Angular: cache largo.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: cualquier ruta cae en index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
