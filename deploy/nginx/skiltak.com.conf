# /etc/nginx/sites-available/skiltak.com
# Frontend Angular (estáticos servidos por Nginx).

# Rate limit zones — capa adicional al rate limit aplicativo de Django.
# Tunear según volumen real una vez que el sitio tenga tráfico.
limit_req_zone $binary_remote_addr zone=skiltak_general:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name skiltak.com www.skiltak.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name skiltak.com www.skiltak.com;

    ssl_certificate     /etc/letsencrypt/live/skiltak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skiltak.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ===== Security headers (siempre, también en respuestas de error) =====
    # HSTS — fuerza HTTPS por 1 año, preload-eligible.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Clickjacking — el SPA no debe ser embebible.
    add_header X-Frame-Options "DENY" always;
    # Bloquea MIME sniffing — evita que el browser ejecute archivos como
    # otro Content-Type del que advertimos.
    add_header X-Content-Type-Options "nosniff" always;
    # Limita información de Referer enviada a sitios externos.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Deshabilita APIs sensibles que no usamos.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    # CSP — la línea más larga pero la más importante. Limita orígenes
    # script/style permitidos para mitigar XSS aunque exista bypass de
    # sanitización. 'unsafe-inline' en style queda por Material Symbols +
    # Font Awesome; cuando los bundlees locales, removelo.
    # SEGURIDAD: 'unsafe-inline' en script-src es necesario porque
    # Angular CLI inyecta en index.html un <link rel="preload" ... onload="
    # this.onload=null;this.rel='stylesheet'"> para preload del CSS crítico.
    # Ese onload= cuenta como inline event handler y CSP lo bloquea sin
    # 'unsafe-inline'. La alternativa (nonce CSP) requiere SSR y refactor
    # del build de Angular. El XSS surface real está mitigado por SRI en
    # los CDN externos, validators de upload y DOMPurify pinned.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://api.skiltak.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Rate limit liviano — burst para SPA assets, deny brute scans.
    limit_req zone=skiltak_general burst=60 nodelay;

    root /var/www/skiltak/frontend/dist/skill-bridge-front/browser;
    index index.html;

    # Hashed assets de Angular: cache largo.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: cualquier ruta cae en index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
