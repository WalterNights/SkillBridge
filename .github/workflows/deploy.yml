name: Deploy SkilTak to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-skiltak
  cancel-in-progress: false

env:
  VPS_HOST: 72.61.75.116
  VPS_USER: root
  VPS_PATH: /var/www/skiltak
  FRONTEND_API_URL: https://api.skiltak.com/api

jobs:
  test-backend:
    name: Test Django backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements-test.txt

      - name: Install backend test deps
        working-directory: backend
        run: pip install -r requirements-test.txt

      - name: Run pytest
        working-directory: backend
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: 'False'
          ALLOWED_HOSTS: localhost,testserver
          DATABASE_ENGINE: django.db.backends.sqlite3
          DATABASE_NAME: ':memory:'
          GEMINI_API_KEY: fake-test-key
          GEMINI_MODEL: gemini-2.0-flash-exp
          ENVIRONMENT: test
        run: pytest

  build-frontend:
    name: Build Angular frontend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Generate environment.prod.ts
        working-directory: frontend
        env:
          FRONTEND_API_URL: ${{ env.FRONTEND_API_URL }}
        run: node scripts/build-env.js

      - name: Build Angular (production)
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/skill-bridge-front
          retention-days: 3

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Rsync frontend dist to VPS
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            rsync -avz --delete --timeout=60 \
              -e "ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15" \
              frontend-dist/ "$VPS_USER@$VPS_HOST:$VPS_PATH/frontend-dist/"

      - name: Run remote deploy script
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15 \
              "$VPS_USER@$VPS_HOST" \
              "VPS_PATH=$VPS_PATH bash -s" < deploy/remote-deploy.sh
