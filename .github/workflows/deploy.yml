name: Deploy SkilTak to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-skiltak
  cancel-in-progress: false

env:
  VPS_HOST: 72.61.75.116
  VPS_USER: root
  VPS_PATH: /var/www/skiltak

jobs:
  test-backend:
    name: Test Django backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements-test.txt

      - name: Install backend test deps
        working-directory: backend
        run: pip install -r requirements-test.txt

      - name: Run pytest
        working-directory: backend
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: 'False'
          ALLOWED_HOSTS: localhost,testserver
          DATABASE_ENGINE: django.db.backends.sqlite3
          DATABASE_NAME: ':memory:'
          GEMINI_API_KEY: fake-test-key
          GEMINI_MODEL: gemini-2.0-flash
          ENVIRONMENT: test
        run: pytest

  deploy:
    name: Deploy to VPS (build on server)
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # Una sola conexión SSH a puerto 22 — la nueva remote-deploy.sh
      # construye Angular y todo lo demás dentro del VPS. Antes el deploy
      # hacía rsync runner→VPS de la dist, pero Hostinger filtra IPs de
      # runners intermitentemente con TCP timeout sin patrón claro. Build
      # en VPS es 100% confiable; tradeoff: ~2 min más por deploy.
      #
      # `ENV_FILE` es un secret con el contenido literal de `.env.prod`;
      # remote-deploy.sh lo escribe a $VPS_PATH/.env al inicio. Eso hace
      # que el secret sea la única fuente de verdad para variables de
      # entorno de prod y elimina el `scp` manual que en Jul 2026 dejó
      # el CORS desincronizado y bloqueó el frontend.
      - name: Run remote deploy script
        uses: nick-fields/retry@v3
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            # ENV_FILE viaja base64-encoded para no romper el shell escape
            # remoto — el contenido literal tiene newlines, `=`, comillas y
            # posibles `$` que romperían un inline plano. remote-deploy.sh
            # lo decodifica al recibir ENV_FILE_B64 y lo escribe a .env.
            ENV_FILE_B64="$(printf '%s' "$ENV_FILE" | base64 -w0)"
            ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15 \
              "$VPS_USER@$VPS_HOST" \
              "VPS_PATH=$VPS_PATH ENV_FILE_B64=$ENV_FILE_B64 bash -s" < deploy/remote-deploy.sh
