name: Deploy SkilTak to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-skiltak
  cancel-in-progress: false

env:
  VPS_HOST: 72.61.75.116
  VPS_USER: root
  VPS_PATH: /var/www/skiltak
  FRONTEND_API_URL: https://api.skiltak.com/api

jobs:
  build-frontend:
    name: Build Angular frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Generate environment.prod.ts
        working-directory: frontend
        env:
          FRONTEND_API_URL: ${{ env.FRONTEND_API_URL }}
        run: node scripts/build-env.js

      - name: Build Angular (production)
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/skill-bridge-front
          retention-days: 3

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Rsync frontend dist to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            frontend-dist/ "$VPS_USER@$VPS_HOST:$VPS_PATH/frontend-dist/"

      - name: Pull backend and restart services
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" \
            "VPS_PATH=$VPS_PATH bash -s" < deploy/remote-deploy.sh
