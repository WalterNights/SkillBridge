<div class="flex min-h-screen">
  <!-- Mobile drawer backdrop -->
  <div class="drawer-backdrop" [class.show]="drawerOpen()" (click)="toggleDrawer(false)" aria-hidden="true"></div>

  <!-- =============== SIDEBAR =============== -->
  <aside
    class="app-sidebar border-r border-white/[0.06] bg-canvas/40 backdrop-blur-xl flex flex-col"
    [class.open]="drawerOpen()"
    [class.collapsed]="sidebarCollapsed()"
  >
    <!-- Brand header -->
    <div class="brand">
      <a routerLink="/dashboard" class="brand-mark" aria-label="SkilTak">
        <img class="brand-icon" src="assets/image/skiltak_isotipo.png" alt="" aria-hidden="true" />
        <span class="brand-text">SkilTak<span class="text-primary">.</span></span>
      </a>
    </div>

    <!-- Nav (shared utility for user + admin) -->
    <nav class="nav-group" aria-label="Principal">
      <p class="nav-section-label">Menú</p>
      <a
        class="nav-item"
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        (click)="toggleDrawer(false)"
        title="Inicio"
      >
        <span class="material-symbols-outlined">home</span>
        <span class="nav-label">Inicio</span>
      </a>
      <a
        class="nav-item"
        routerLink="/cv"
        routerLinkActive="active"
        (click)="toggleDrawer(false)"
        title="Mi CV"
      >
        <span class="material-symbols-outlined">description</span>
        <span class="nav-label">Mi CV</span>
      </a>
    </nav>

    <!-- Admin-only group -->
    <nav *ngIf="isAdmin()" class="nav-group" aria-label="Administración">
      <p class="nav-section-label">Administración</p>
      <a
        class="nav-item"
        routerLink="/admin/users"
        routerLinkActive="active"
        (click)="toggleDrawer(false)"
        title="Usuarios"
      >
        <span class="material-symbols-outlined">group</span>
        <span class="nav-label">Usuarios</span>
      </a>
      <a
        class="nav-item"
        routerLink="/admin/stats"
        routerLinkActive="active"
        (click)="toggleDrawer(false)"
        title="Estadísticas"
      >
        <span class="material-symbols-outlined">bar_chart</span>
        <span class="nav-label">Estadísticas</span>
      </a>
    </nav>

    <!-- Tip widget (utility footer, hidden when collapsed) -->
    <div class="sidebar-tip">
      <div class="glass rounded-xl p-4">
        <span class="material-symbols-outlined text-primary" style="font-size: 18px; font-variation-settings: 'FILL' 1"
          >tips_and_updates</span
        >
        <p class="text-sm text-bone font-semibold mt-2 mb-1 leading-snug">Tip del día</p>
        <p class="text-xs text-warm-grey mb-3 leading-snug">{{ tipOfTheDay }}</p>
        <a href="#" class="text-xs text-primary font-semibold hover:underline underline-offset-4">
          Ver más recursos →
        </a>
      </div>
    </div>
  </aside>

  <!-- =============== MAIN =============== -->
  <main class="flex-1 min-w-0 flex flex-col">
    <!-- Top bar.
         Background SÓLIDO (sin backdrop-blur) — los filters crean un
         containing block para position:fixed, lo que hacía que el
         drawer de notificaciones quedara atrapado dentro del header
         de 64px en vez de cubrir todo el viewport. -->
    <header
      class="h-16 px-4 lg:px-8 border-b border-white/[0.06] flex items-center justify-between gap-3 sticky top-0 bg-canvas z-30"
    >
      <div class="flex items-center gap-3 min-w-0 flex-1">
        <button class="hamburger" (click)="toggleDrawer(true)" aria-label="Abrir menú">
          <span class="material-symbols-outlined" style="font-size: 20px; font-variation-settings: 'wght' 400"
            >menu</span
          >
        </button>

        <!-- Collapse toggle (desktop only) — chevron a la izquierda del
             search bar. Cambia dirección según el estado del sidebar. -->
        <button
          class="collapse-toggle"
          (click)="toggleCollapse()"
          [attr.aria-label]="sidebarCollapsed() ? 'Expandir menú' : 'Contraer menú'"
          [title]="sidebarCollapsed() ? 'Expandir menú' : 'Contraer menú'"
        >
          <span class="material-symbols-outlined" style="font-size: 20px; font-variation-settings: 'wght' 400">{{
            sidebarCollapsed() ? 'chevron_right' : 'chevron_left'
          }}</span>
        </button>

        <!-- Search input — desktop only; each page builds its own
             contextual search if it needs one. -->
        <div class="hidden md:flex items-center gap-3 flex-1 max-w-md">
          <span
            class="material-symbols-outlined text-warm-grey"
            style="font-size: 18px; font-variation-settings: 'wght' 300"
            >search</span
          >
          <input
            type="text"
            placeholder="Buscar por título, empresa, skill…"
            class="flex-1 bg-transparent border-none text-sm text-bone placeholder:text-dim focus:outline-none"
          />
          <span class="hidden lg:inline font-mono text-[11px] text-dim border border-white/[0.08] rounded px-1.5 py-0.5"
            >⌘ K</span
          >
        </div>
      </div>

      <app-user-nav />
    </header>

    <!-- Content from child routes -->
    <div class="flex-1 overflow-y-auto">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
