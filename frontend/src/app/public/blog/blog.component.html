<app-public-nav *ngIf="!insideShell" />

<main
  [class.pt-32]="!insideShell"
  [class.pt-8]="insideShell"
  class="pb-24 px-gutter min-h-[60vh] flex items-center"
>
  <div class="max-w-2xl mx-auto text-center">
    <p class="text-label uppercase text-primary font-semibold mb-3 tracking-widest">
      Blog
    </p>
    <h1 class="text-[40px] sm:text-[56px] leading-[1.05] tracking-[-0.03em] font-black text-bone mb-6">
      Próximamente.
    </h1>
    <p class="text-body-lg text-warm-grey mb-8">
      Estamos preparando un feed corto con análisis del mercado laboral en Latam,
      consejos puntuales y novedades del producto. Mientras tanto, las guías largas viven
      en Recursos.
    </p>
    <a routerLink="/recursos" class="btn-primary px-6 py-3 rounded-xl text-sm inline-flex items-center gap-2">
      Ver Recursos
      <span class="material-symbols-outlined" style="font-size: 16px">arrow_forward</span>
    </a>
  </div>
</main>

<app-public-footer *ngIf="!insideShell" />
