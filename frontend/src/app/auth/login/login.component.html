<!-- Full-screen loading overlay shown while the login HTTP call is in flight. -->
<div
  *ngIf="isLoading"
  class="fixed inset-0 bg-black/60 backdrop-blur-md z-50 flex items-center justify-center animate-fade-in"
>
  <div class="glass-strong rounded-2xl px-8 py-6 flex items-center gap-4">
    <span class="loader-ring"></span>
    <span class="text-bone text-body">Ingresando…</span>
  </div>
</div>

<!-- Minimal page header above the split. -->
<header class="absolute top-0 inset-x-0 z-10">
  <div class="max-w-6xl mx-auto flex items-center px-6 py-6">
    <a routerLink="/" class="text-xl font-bold text-bone tracking-tight">
      SkilTak<span class="text-primary">.</span>
    </a>
  </div>
</header>

<!-- Split layout: form left (always visible), editorial photo + stat right (lg+). -->
<main class="h-screen flex overflow-hidden">
  <section class="flex-1 flex items-center justify-center px-6 py-20">
    <div class="w-full max-w-md">
      <div class="text-center mb-6">
        <h1 class="text-4xl font-black text-bone tracking-tight leading-tight mb-3">
          Bienvenido de <span class="hero-accent">vuelta</span>
        </h1>
        <p class="text-warm-grey">Tu próximo match te está esperando.</p>
      </div>

      <div class="glass-strong rounded-2xl p-6">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
          <!-- Username -->
          <div>
            <label class="field-label" for="login-username">Usuario</label>
            <input
              id="login-username"
              type="text"
              class="field-input"
              formControlName="username"
              placeholder="Tu usuario"
              autocomplete="username"
            />
          </div>

          <!-- Password -->
          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="field-label !mb-0" for="login-password">Contraseña</label>
              <a routerLink="/auth/forgot-password" class="text-xs text-warm-grey hover:text-bone transition-colors">
                ¿La olvidaste?
              </a>
            </div>
            <div class="relative">
              <input
                id="login-password"
                [type]="showPassword ? 'text' : 'password'"
                class="field-input pr-12"
                formControlName="password"
                placeholder="Tu contraseña"
                autocomplete="current-password"
              />
              <button
                type="button"
                class="btn-ghost absolute right-3 top-1/2 -translate-y-1/2 p-1"
                (click)="togglePasswordVisibility()"
                [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
              >
                <span class="material-symbols-outlined" style="font-size: 20px; font-variation-settings: 'wght' 300">{{
                  showPassword ? 'visibility_off' : 'visibility'
                }}</span>
              </button>
            </div>
          </div>

          <!-- Remember-me -->
          <label class="flex items-center gap-3 cursor-pointer select-none">
            <input type="checkbox" class="sr-only" [checked]="isStorage" (change)="toggleStorage()" />
            <span
              class="w-9 h-5 rounded-full transition-colors relative"
              [ngClass]="isStorage ? 'bg-primary' : 'bg-white/10'"
            >
              <span
                class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-bone transition-transform"
                [class.translate-x-4]="isStorage"
              ></span>
            </span>
            <span class="text-sm text-warm-grey">Mantener sesión iniciada</span>
          </label>

          <!-- Backend error (bad credentials, etc) -->
          <div
            *ngIf="errorMessage"
            class="text-sm text-danger bg-danger/10 border border-danger/30 rounded-lg px-4 py-3"
          >
            {{ errorMessage }}
          </div>

          <button
            type="submit"
            class="btn-primary w-full py-3.5 rounded-xl text-base mt-2"
            [disabled]="loginForm.invalid || isLoading"
          >
            Ingresar
          </button>

          <!-- Divider + OAuth alternative -->
          <div class="oauth-divider">
            <span>o</span>
          </div>

          <a [href]="linkedInLoginUrl" class="oauth-btn linkedin">
            <svg
              class="oauth-icon"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.063 2.063 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
              />
            </svg>
            Continuar con LinkedIn
          </a>
        </form>
      </div>

      <p class="text-center mt-5 text-sm text-warm-grey">
        ¿Todavía no tienes cuenta?
        <a routerLink="/auth/register" class="text-bone font-semibold hover:underline underline-offset-4 ml-1">
          Crear cuenta
        </a>
      </p>
    </div>
  </section>

  <aside class="hidden lg:block w-[42%] relative">
    <div class="photo absolute inset-0">
      <img
        src="assets/image/a_professional_latin_american_woman_in_a_modern_minimal_office_reviewing_job.png"
        alt=""
      />
    </div>

    <div class="absolute bottom-10 left-10 right-10 z-10">
      <div
        class="bg-canvas/85 backdrop-blur-xl border border-white/10 border-l-2 border-l-primary rounded-r-2xl p-7"
      >
        <div class="flex items-start gap-4 mb-4">
          <span class="text-5xl font-black text-primary leading-none tracking-tight">+12</span>
          <span class="text-xs text-warm-grey uppercase tracking-[0.15em] leading-snug pt-1.5">
            Matches nuevos esta semana
          </span>
        </div>
        <p class="text-base text-bone leading-snug italic font-light">
          "Tu próxima oportunidad no está en una lista genérica."
        </p>
      </div>
    </div>
  </aside>
</main>
