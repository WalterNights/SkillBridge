[pytest]
DJANGO_SETTINGS_MODULE = core.test_settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --tb=short --strict-markers --reuse-db
filterwarnings =
    ignore::DeprecationWarning:google.*
    ignore::PendingDeprecationWarning
markers =
    integration: tests que tocan el endpoint HTTP completo
    unit: tests de una sola función o método
